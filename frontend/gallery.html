<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gallery – MemoryLane</title>
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ── Navbar ── */
    .event-badge { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.12em; }
    .live-dot { display: inline-flex; align-items: center; gap: 0.35rem; font-family: var(--font-mono); font-size: 0.62rem; color: #2ECC71; letter-spacing: 0.08em; }

    /* ── Upload section ── */
    .upload-section {
      padding: 1rem 0.75rem 0.5rem;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .upload-toggle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(212,175,55,0.06);
      border: 1px dashed var(--border-lg);
      border-radius: var(--r-lg);
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all var(--t) var(--ease);
      font-family: var(--font-body);
      color: var(--white);
    }
    .upload-toggle-btn:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); }

    .upload-drawer {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s var(--ease);
    }
    .upload-drawer.open { max-height: 600px; }
    .upload-drawer-inner { padding: 1rem 0 0; display: flex; flex-direction: column; gap: 1rem; }

    /* ── Preview ── */
    .preview-wrap {
      position: relative;
      border-radius: var(--r);
      overflow: hidden;
      display: none;
      aspect-ratio: 4/3;
      background: var(--bg-card);
    }
    .preview-wrap.visible { display: block; }
    .preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .preview-remove {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.7);
      color: var(--white);
      border: none;
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Progress ── */
    .upload-progress { display: none; flex-direction: column; gap: 0.4rem; }
    .upload-progress.visible { display: flex; }

    /* ── Gallery Grid ── */
    .gallery-section { flex: 1; padding-bottom: 1.5rem; }

    .gallery-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      gap: 0.75rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .photos-count { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }

    /* New photo pulse animation */
    @keyframes newPhotoIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .photo-item.new { animation: newPhotoIn 0.5s var(--ease) forwards; }

    /* ── Photo card overlay content ── */
    .overlay-user {
      font-family: var(--font-head);
      font-size: 0.85rem;
      color: var(--white);
      font-style: italic;
    }
    .overlay-actions { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.3rem; }
    .like-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--white);
      font-size: 0.78rem;
      padding: 0.2rem 0.45rem;
      border-radius: var(--r-pill);
      transition: all var(--t) var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .like-btn:hover, .like-btn.liked { color: #E74C3C; }
    .like-btn.liked .heart { animation: heartBeat 0.3s var(--ease); }
    @keyframes heartBeat { 0%,100% { transform:scale(1); } 50% { transform:scale(1.4); } }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      gap: 0.75rem;
      text-align: center;
    }
    .empty-icon { font-size: 3rem; opacity: 0.3; }

    /* ── Comment sheet ── */
    .comment-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      padding: 1.25rem;
      transform: translateY(100%);
      transition: transform 0.35s var(--ease);
      z-index: 7000;
      max-height: 70dvh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .comment-sheet.open { transform: translateY(0); }
    .comment-handle { width: 40px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto; opacity: 0.4; }
    .comment-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
    .comment-item { display: flex; gap: 0.6rem; }
    .comment-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 600; color: #000;
    }
    .comment-body { font-size: 0.82rem; }
    .comment-name { font-weight: 500; color: var(--gold); font-size: 0.75rem; }
    .comment-text { color: rgba(240,237,230,0.8); }
    .comment-time { font-size: 0.65rem; color: var(--muted); }
    .comment-input-row { display: flex; gap: 0.5rem; }
    .comment-input-row input { flex: 1; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark"></div>
      <div>
        <span class="logo-text">MEMORYLANE</span>
        <span class="logo-sub" id="nav-event-name">Loading…</span>
      </div>
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span class="live-dot"><span class="dot dot-live"></span><span id="ws-status">LIVE</span></span>
      <button class="btn btn-outline btn-sm" id="leave-btn">Leave</button>
    </div>
  </nav>

  <!-- Upload section -->
  <div class="upload-section">
    <button class="upload-toggle-btn" id="upload-toggle" aria-expanded="false">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span style="font-size:1.4rem">📷</span>
        <div style="text-align:left">
          <div style="font-weight:500;font-size:0.9rem">Add Your Photo</div>
          <div class="text-xs text-muted" style="font-family:var(--font-mono)">JPG/PNG · Max 3MB</div>
        </div>
      </div>
      <span id="upload-chevron" style="transition:transform 0.3s var(--ease)">▼</span>
    </button>

    <div class="upload-drawer" id="upload-drawer">
      <div class="upload-drawer-inner">

        <!-- Drop zone -->
        <div class="upload-zone" id="drop-zone" role="button" tabindex="0">
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" />
          <div id="drop-hint" style="pointer-events:none">
            <div style="font-size:2rem;margin-bottom:0.5rem">🖼️</div>
            <div style="font-weight:500;font-size:0.9rem">Tap to choose or drag & drop</div>
            <div class="text-xs text-muted" style="margin-top:0.25rem">JPG · PNG · max 3 MB</div>
          </div>
        </div>

        <!-- Image preview -->
        <div class="preview-wrap" id="preview-wrap">
          <img id="preview-img" src="" alt="Preview" />
          <button class="preview-remove" id="preview-remove" title="Remove">✕</button>
        </div>

        <!-- Upload progress -->
        <div class="upload-progress" id="upload-progress">
          <div style="display:flex;justify-content:space-between;font-size:0.78rem">
            <span class="text-muted">Uploading…</span>
            <span class="mono text-gold" id="progress-pct">0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>

        <!-- Submit -->
        <button class="btn btn-primary btn-full" id="upload-btn" disabled>
          <span id="upload-btn-text">Share This Moment</span>
          <div id="upload-spinner" class="spinner" style="display:none"></div>
        </button>

      </div>
    </div>
  </div>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="gallery-controls">
      <span class="photos-count" id="photos-count">Loading photos…</span>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Refresh">↻</button>
      </div>
    </div>

    <div class="photo-grid" id="photo-grid">
      <!-- Skeleton loaders -->
      <div class="photo-item"><div class="skeleton" style="aspect-ratio:3/4"></div></div>
      <div class="photo-item"><div class="skeleton" style="aspect-ratio:4/3"></div></div>
      <div class="photo-item"><div class="skeleton" style="aspect-ratio:1/1"></div></div>
      <div class="photo-item"><div class="skeleton" style="aspect-ratio:3/4"></div></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">📸</div>
      <h3 style="font-family:var(--font-head);font-weight:300">No Photos Yet</h3>
      <p class="text-muted text-sm">Be the first to share a moment!</p>
    </div>
  </section>

  <!-- Comment sheet -->
  <div id="comment-overlay" style="position:fixed;inset:0;z-index:6999;display:none" onclick="closeComments()"></div>
  <div class="comment-sheet" id="comment-sheet">
    <div class="comment-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h3 style="font-family:var(--font-head);font-size:1.1rem">Comments</h3>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeComments()">✕</button>
    </div>
    <div class="comment-list" id="comment-list"></div>
    <div class="comment-input-row">
      <input id="comment-input" type="text" placeholder="Add a comment…" maxlength="300" />
      <button class="btn btn-primary btn-sm" id="comment-submit">Send</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // ── Auth Guard ─────────────────────────────────────────────────────────────
    if (!Session.hasSession()) {
      window.location.href = 'index.html' + (window.location.search || '');
    }

    // ── State ──────────────────────────────────────────────────────────────────
    const userId    = Session.get(CONFIG.KEY_USER_ID);
    const userName  = Session.get(CONFIG.KEY_USER_NAME);
    const eventCode = Session.get(CONFIG.KEY_EVENT_CODE);
    const eventName = Session.get(CONFIG.KEY_EVENT_NAME);

    document.getElementById('nav-event-name').textContent = eventName || eventCode;
    document.title = `${eventName || eventCode} – MemoryLane`;

    let photos = [];
    let selectedFile = null;
    let activePhotoId = null;
    let ws = null;
    let pollTimer = null;
    let lastTimestamp = 0;
    let likedSet = new Set(JSON.parse(localStorage.getItem('ml_liked') || '[]'));

    // ── WebSocket Setup ────────────────────────────────────────────────────────
    function connectWS() {
      try {
        ws = new WebSocket(`${CONFIG.WS_URL}?event=${eventCode}`);

        ws.onopen = () => {
          document.getElementById('ws-status').textContent = 'LIVE';
          clearInterval(pollTimer);
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'NEW_PHOTO' && msg.photo) prependPhoto(msg.photo);
          if (msg.type === 'PHOTO_DELETED') removePhotoCard(msg.photoId);
          if (msg.type === 'LIKE_UPDATE') updateLikeCount(msg.photoId, msg.likes);
          if (msg.type === 'NEW_COMMENT' && msg.photoId === activePhotoId) appendComment(msg.comment);
        };

        ws.onclose = () => {
          document.getElementById('ws-status').textContent = 'POLL';
          // Fallback to polling
          pollTimer = setInterval(pollNew, CONFIG.POLL_INTERVAL_MS);
          setTimeout(connectWS, 5000); // retry
        };

        ws.onerror = () => ws.close();

        // Heartbeat
        setInterval(() => { if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'PING' })); }, 30000);
      } catch {
        pollTimer = setInterval(pollNew, CONFIG.POLL_INTERVAL_MS);
      }
    }

    // Fallback polling for new photos
    async function pollNew() {
      const { ok, data } = await apiFetch(`/photos/${eventCode}/since/${lastTimestamp}`);
      if (ok && data.photos?.length) {
        data.photos.forEach(p => prependPhoto(p));
        lastTimestamp = data.timestamp;
      }
    }

    // ── Load Gallery ───────────────────────────────────────────────────────────
    async function loadPhotos() {
      const { ok, data } = await apiFetch(`/photos/${eventCode}?limit=60`);
      if (!ok) { showToast('Failed to load photos', 'error'); return; }

      document.getElementById('photo-grid').innerHTML = '';
      photos = data.photos || [];

      if (photos.length === 0) {
        document.getElementById('empty-state').style.display = 'flex';
      } else {
        document.getElementById('empty-state').style.display = 'none';
        photos.forEach(renderPhoto);
      }

      updateCount(data.pagination?.total || photos.length);
      lastTimestamp = Date.now();
    }

    // ── Render a single photo card ─────────────────────────────────────────────
    function renderPhoto(photo, prepend = false) {
      const card = document.createElement('div');
      card.className = 'photo-item';
      card.dataset.id = photo._id;

      const isLiked = likedSet.has(photo._id);

      card.innerHTML = `
        <img src="${photo.image_url}" alt="Photo by ${photo.user_name}" loading="lazy" />
        <div class="photo-overlay">
          <div style="width:100%">
            <div class="overlay-user">${photo.user_name}</div>
            <div class="overlay-actions">
              <button class="like-btn ${isLiked ? 'liked' : ''}" data-pid="${photo._id}" data-count="${photo.likes}">
                <span class="heart">${isLiked ? '❤️' : '🤍'}</span>
                <span class="like-count">${photo.likes || 0}</span>
              </button>
              <button class="like-btn" onclick="openComments('${photo._id}')" title="Comments">
                💬 <span>${photo.comments?.length || 0}</span>
              </button>
            </div>
          </div>
        </div>
      `;

      // Click image → lightbox
      card.querySelector('img').addEventListener('click', () => openLightbox(photo.image_url, photo.user_name, photo.timestamp));

      // Like button
      card.querySelector('.like-btn[data-pid]').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleLike(photo._id, e.currentTarget);
      });

      const grid = document.getElementById('photo-grid');
      if (prepend) {
        grid.prepend(card);
        card.classList.add('new');
      } else {
        grid.appendChild(card);
      }
    }

    function prependPhoto(photo) {
      // Avoid duplicates
      if (document.querySelector(`[data-id="${photo._id}"]`)) return;
      document.getElementById('empty-state').style.display = 'none';
      photos.unshift(photo);
      renderPhoto(photo, true);
      updateCount(photos.length);
      showToast(`📸 ${photo.user_name} shared a photo!`, 'info', 2500);
    }

    function removePhotoCard(photoId) {
      const card = document.querySelector(`[data-id="${photoId}"]`);
      if (card) card.remove();
    }

    function updateCount(n) {
      document.getElementById('photos-count').textContent = `${n} photo${n !== 1 ? 's' : ''} shared`;
    }

    // ── Like toggle ────────────────────────────────────────────────────────────
    async function toggleLike(photoId, btn) {
      const { ok, data } = await apiFetch(`/photos/${photoId}/like`, {
        method: 'POST',
        body: JSON.stringify({ user_id: userId }),
      });
      if (!ok) return;

      const heart = btn.querySelector('.heart');
      const countEl = btn.querySelector('.like-count');
      if (data.liked) {
        likedSet.add(photoId);
        btn.classList.add('liked');
        heart.textContent = '❤️';
      } else {
        likedSet.delete(photoId);
        btn.classList.remove('liked');
        heart.textContent = '🤍';
      }
      countEl.textContent = data.likes;
      localStorage.setItem('ml_liked', JSON.stringify([...likedSet]));
    }

    function updateLikeCount(photoId, likes) {
      const card = document.querySelector(`[data-id="${photoId}"]`);
      if (!card) return;
      const countEl = card.querySelector('.like-count');
      if (countEl) countEl.textContent = likes;
    }

    // ── Upload ─────────────────────────────────────────────────────────────────
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const uploadBtn   = document.getElementById('upload-btn');

    fileInput.addEventListener('change', () => handleFileSelect(fileInput.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFileSelect(e.dataTransfer.files[0]);
    });

    document.getElementById('preview-remove').addEventListener('click', clearFile);

    function handleFileSelect(file) {
      if (!file) return;
      if (!CONFIG.ALLOWED_TYPES.includes(file.type)) {
        return showToast('Only JPG and PNG files allowed', 'error');
      }
      if (file.size > CONFIG.MAX_FILE_SIZE_MB * 1024 * 1024) {
        return showToast(`File too large. Max ${CONFIG.MAX_FILE_SIZE_MB}MB. Image will be compressed.`, 'info');
      }

      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.classList.add('visible');
      document.getElementById('drop-hint').style.display = 'none';
      uploadBtn.disabled = false;
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src = '';
      previewWrap.classList.remove('visible');
      document.getElementById('drop-hint').style.display = 'block';
      uploadBtn.disabled = true;
    }

    uploadBtn.addEventListener('click', uploadPhoto);

    async function uploadPhoto() {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      document.getElementById('upload-btn-text').textContent = 'Compressing…';
      document.getElementById('upload-spinner').style.display = 'block';

      try {
        // Client-side compression
        const compressed = await compressImage(selectedFile, 2, 1920);

        document.getElementById('upload-btn-text').textContent = 'Uploading…';
        showProgress(true, 30);

        const formData = new FormData();
        formData.append('photo', compressed, 'photo.jpg');
        formData.append('event_code', eventCode);
        formData.append('user_id', userId);

        showProgress(true, 60);

        const res = await fetch(`${CONFIG.API_URL}/photos/upload`, {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();

        showProgress(true, 100);

        if (!res.ok || !data.success) throw new Error(data.message || 'Upload failed');

        showToast('Photo shared! ✨', 'success');
        clearFile();
        closeUploadDrawer();

      } catch (err) {
        showToast(err.message || 'Upload error', 'error');
      } finally {
        document.getElementById('upload-btn-text').textContent = 'Share This Moment';
        document.getElementById('upload-spinner').style.display = 'none';
        uploadBtn.disabled = false;
        setTimeout(() => showProgress(false, 0), 1000);
      }
    }

    function showProgress(visible, pct) {
      const el = document.getElementById('upload-progress');
      el.classList.toggle('visible', visible);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    // ── Upload drawer toggle ───────────────────────────────────────────────────
    document.getElementById('upload-toggle').addEventListener('click', () => {
      const drawer = document.getElementById('upload-drawer');
      const chevron = document.getElementById('upload-chevron');
      const btn = document.getElementById('upload-toggle');
      const isOpen = drawer.classList.toggle('open');
      chevron.style.transform = isOpen ? 'rotate(180deg)' : '';
      btn.setAttribute('aria-expanded', isOpen);
    });

    function closeUploadDrawer() {
      document.getElementById('upload-drawer').classList.remove('open');
      document.getElementById('upload-chevron').style.transform = '';
    }

    // ── Comments ───────────────────────────────────────────────────────────────
    function openComments(photoId) {
      activePhotoId = photoId;
      const overlay = document.getElementById('comment-overlay');
      const sheet   = document.getElementById('comment-sheet');
      const list    = document.getElementById('comment-list');

      overlay.style.display = 'block';
      sheet.classList.add('open');

      // Load comments for this photo
      const photo = photos.find(p => p._id === photoId);
      list.innerHTML = '';
      (photo?.comments || []).forEach(appendComment);
    }

    function closeComments() {
      document.getElementById('comment-overlay').style.display = 'none';
      document.getElementById('comment-sheet').classList.remove('open');
      activePhotoId = null;
    }

    function appendComment(c) {
      const list = document.getElementById('comment-list');
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `
        <div class="comment-avatar">${(c.user_name || 'A')[0].toUpperCase()}</div>
        <div class="comment-body">
          <div class="comment-name">${c.user_name}</div>
          <div class="comment-text">${c.text}</div>
          <div class="comment-time">${timeAgo(c.created_at)}</div>
        </div>
      `;
      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
    }

    document.getElementById('comment-submit').addEventListener('click', async () => {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text || !activePhotoId) return;

      const { ok, data } = await apiFetch(`/photos/${activePhotoId}/comment`, {
        method: 'POST',
        body: JSON.stringify({ user_id: userId, text }),
      });

      if (ok && data.success) {
        input.value = '';
        appendComment(data.comment);
      }
    });

    document.getElementById('comment-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('comment-submit').click();
    });

    // ── Leave ──────────────────────────────────────────────────────────────────
    document.getElementById('leave-btn').addEventListener('click', () => {
      if (confirm('Leave this event session?')) {
        Session.clear();
        window.location.href = 'index.html';
      }
    });

    // ── Refresh button ─────────────────────────────────────────────────────────
    document.getElementById('refresh-btn').addEventListener('click', loadPhotos);

    // ── Init ───────────────────────────────────────────────────────────────────
    loadPhotos();
    connectWS();
  </script>
</body>
</html>
